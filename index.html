<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サーキュラー・ラボ・広島</title>
<script src="content.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --red:       #B42020;
  --red-dark:  #380C0C;
  --red-deep:  #1E0606;
  --red-mid:   #6A2010;
  --red-light: #FFF8F5;
  --orange:    #F07820;
  --orange-dk: #86400A;
  --border:    #F0D8B8;
  --white:     #ffffff;
  --fs-xs:  11px;
  --fs-sm:  13px;
  --fs-md:  15px;
  --fs-lg:  18px;
  --fs-xl:  clamp(22px, 3vw, 34px);
  --fs-2xl: clamp(22px, 2.4vw, 36px);
  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-lg:   20px;
  --radius-full: 999px;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  color: var(--red-dark);
  background: var(--white);
  line-height: 1.8;
  font-size: var(--fs-md);
}

.tag {
  display: block;
  font-size: var(--fs-xs);
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--orange-dk);
  margin-bottom: 14px;
}
h1 {
  font-size: var(--fs-2xl);
  font-weight: 800;
  line-height: 1.45;
  color: var(--red-dark);
  word-break: keep-all;
  line-break: strict;
  overflow-wrap: break-word;
}
h2 {
  font-size: var(--fs-xl);
  font-weight: 800;
  line-height: 1.4;
  color: var(--red-dark);
  margin-bottom: 20px;
}
h3 {
  font-size: var(--fs-lg);
  font-weight: 700;
  color: var(--red-dark);
  margin-bottom: 10px;
}
p { color: var(--red-mid); line-height: 1.9; }

.highlight {
  background: linear-gradient(transparent 54%, rgba(240,120,32,0.45) 54%);
}
.h1-line2 { display: block; }

.container { max-width: 1100px; margin: 0 auto; padding: 0 6%; }
section { padding: 100px 0; }
section:nth-child(even) { background: var(--red-light); }
section:nth-child(odd)  { background: var(--white); }

nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5%;
  background: rgba(255,255,255,0.96);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border-bottom: 3px solid var(--red);
  z-index: 100;
}
.nav-logo {
  font-size: 13px; font-weight: 700;
  color: var(--red-dark); letter-spacing: 0.04em;
  text-decoration: none;
}
.nav-links { display: flex; gap: 32px; }
.nav-links a {
  font-size: 12px; font-weight: 500;
  color: var(--red-mid); text-decoration: none;
  letter-spacing: 0.06em; transition: color 0.2s;
}
.nav-links a:hover { color: var(--red); }

.hamburger {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer; padding: 4px;
}
.hamburger span {
  display: block; width: 22px; height: 2px;
  background: var(--red-dark); border-radius: 2px;
  transition: transform 0.3s, opacity 0.3s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu {
  display: none; position: fixed; inset: 0;
  background: rgba(255,255,255,0.98);
  flex-direction: column; align-items: center; justify-content: center; gap: 36px;
  z-index: 150;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-size: 22px; font-weight: 700;
  color: var(--red-dark); text-decoration: none; letter-spacing: 0.06em;
}

.btn {
  display: inline-block;
  padding: 13px 36px;
  border-radius: var(--radius-full);
  font-size: var(--fs-sm);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-decoration: none;
  transition: background 0.2s, color 0.2s, transform 0.2s;
  border: none; cursor: pointer;
}
.btn-red   { background: var(--red); color: var(--white); }
.btn-red:hover { background: #8C1818; transform: translateY(-2px); }
.btn-ghost { background: transparent; color: var(--orange-dk); border: 2px solid var(--orange); }
.btn-ghost:hover { background: var(--orange); color: var(--white); }
.btn-group { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 36px; }

.hero {
  display: flex; align-items: center;
  padding: clamp(96px, 8vw, 128px) 6% clamp(48px, 5vw, 72px);
  background: var(--white);
}
.hero-inner { max-width: 700px; width: 100%; }
.hero h1 { margin: 16px 0 24px; }
.hero-lead {
  font-size: clamp(16px, 2vw, 20px);
  font-weight: 700; color: var(--red-dark); margin-bottom: 8px;
}
.hero-body { font-size: clamp(14px, 1.6vw, 16px); color: var(--red-mid); line-height: 2.0; }

.mission-inner { display: grid; grid-template-columns: 100px 1fr; gap: 60px; align-items: center; }
.mission-letter { font-size: 100px; font-weight: 800; color: var(--orange); opacity: 0.15; line-height: 1; -webkit-user-select: none; user-select: none; }

.service-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 48px; }
.service-card {
  background: var(--white); border-radius: var(--radius-lg);
  padding: 32px 26px; border: 1px solid var(--border);
  border-top: 4px solid var(--orange);
  transition: transform 0.2s, box-shadow 0.2s;
}
.service-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(180,32,32,0.08); }
.service-num { font-size: 32px; font-weight: 800; color: var(--orange-dk); margin-bottom: 14px; line-height: 1; }
.service-card h3 { font-size: 15px; }
.service-card p  { font-size: 13px; margin-top: 8px; }

.case-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; margin-top: 48px; }
.case-card {
  background: var(--white); border-radius: var(--radius-lg);
  padding: 40px 36px; border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.case-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--red); }
.case-card-num { position: absolute; top: 20px; right: 24px; font-size: 52px; font-weight: 800; color: var(--orange); opacity: 0.15; line-height: 1; }
.case-card h3 { font-size: 16px; margin-bottom: 12px; }
.case-card p  { font-size: 13px; margin-bottom: 28px; }
.case-stat-num   { font-size: 38px; font-weight: 800; color: var(--red); line-height: 1; }
.case-stat-label { font-size: 12px; color: var(--red-mid); margin-top: 4px; }

.member-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 48px; }
.member-card {
  background: var(--red-light); border-radius: var(--radius-lg);
  padding: 32px; border: 1px solid var(--border);
  display: flex; gap: 22px; align-items: flex-start;
}
.member-avatar {
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--red); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; flex-shrink: 0;
}
.member-role { font-size: 10px; font-weight: 700; color: var(--orange-dk); letter-spacing: 0.1em; margin-bottom: 4px; }
.member-name { font-size: 17px; font-weight: 800; color: var(--red-dark); margin-bottom: 8px; }
.member-desc { font-size: 13px; line-height: 1.8; }

.donation { background: var(--red-deep) !important; color: var(--white); }
.donation .tag { color: rgba(240,120,32,0.9); }
.donation h2   { color: var(--white); }
.donation > .container > p { color: rgba(255,215,200,0.85); }
.donation-plans { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 48px; }
.plan-card { border-radius: var(--radius-lg); padding: 32px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05); }
.plan-card.featured { border-color: rgba(240,120,32,0.5); }
.plan-badge { display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.15em; padding: 3px 10px; border-radius: var(--radius-full); background: rgba(240,120,32,0.25); color: rgba(255,200,140,1); margin-bottom: 12px; }
.plan-name { font-size: 17px; font-weight: 700; color: var(--white); margin-bottom: 4px; }
.plan-note { font-size: 12px; color: rgba(255,215,200,0.55); margin-bottom: 20px; }
.plan-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: rgba(240,160,80,0.9); margin: 16px 0 8px; }
.plan-items { list-style: none; }
.plan-items li { font-size: 12px; color: rgba(255,215,200,0.8); padding: 4px 0; display: flex; gap: 8px; line-height: 1.7; }
.plan-items li::before { content: '✓'; color: var(--orange); flex-shrink: 0; }
.donation-uses { background: rgba(255,255,255,0.05); border-radius: var(--radius-lg); padding: 32px; border: 1px solid rgba(255,255,255,0.08); margin-top: 32px; }
.donation-uses h3 { font-size: 14px; font-weight: 700; color: rgba(240,160,80,1); margin-bottom: 16px; }
.donation-uses li { font-size: 14px; color: rgba(255,215,200,0.85); list-style: none; display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06); line-height: 1.7; }
.donation-uses li::before { content: '→'; color: var(--orange); flex-shrink: 0; }
.donation-note { margin-top: 24px; padding: 24px 28px; background: rgba(255,255,255,0.04); border-radius: var(--radius-md); border-left: 4px solid var(--orange); font-size: 14px; color: rgba(255,215,200,0.8); line-height: 1.9; }
.partners { margin-top: 56px; }
.partners-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; color: rgba(240,120,32,0.9); margin-bottom: 20px; text-transform: uppercase; }
.partners-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.partner-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: var(--radius-md); padding: 22px 18px; text-align: center; font-size: 12px; font-weight: 700; color: rgba(255,215,200,0.9); line-height: 1.9; }

.contact { text-align: center; }
.contact h2 { margin-bottom: 16px; }
.contact p  { max-width: 480px; margin: 0 auto 12px; }
.org-info { font-size: 13px; color: var(--red-mid); line-height: 2.0; margin-bottom: 32px; }
.org-info a { color: var(--orange-dk); text-decoration: none; }
.org-info a:hover { text-decoration: underline; }

footer { background: #111; padding: 32px 24px; text-align: center; font-size: 13px; color: #E8E8E8; letter-spacing: 0.04em; line-height: 1.7; }
footer p { color: inherit; }
.footer-version { display: block; margin-top: 6px; font-size: 10px; color: rgba(232,232,232,0.4); letter-spacing: 0.1em; }

@media (max-width: 768px) {
  nav { padding: 0 5%; }
  .nav-links { display: none; }
  .hamburger { display: flex; }
  section { padding: 70px 0; }
  .mission-inner  { grid-template-columns: 1fr; gap: 16px; }
  .mission-letter { font-size: 60px; }
  .service-grid   { grid-template-columns: 1fr; }
  .case-grid      { grid-template-columns: 1fr; }
  .member-grid    { grid-template-columns: 1fr; }
  .donation-plans { grid-template-columns: 1fr; }
  .partners-grid  { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav aria-label="メインメニュー">
  <a href="#top" class="nav-logo" id="nav_logo"></a>
  <div class="nav-links">
    <a href="#mission">Mission</a>
    <a href="#service">Service</a>
    <a href="#casestudy">Case Study</a>
    <a href="#members">Member</a>

    <span></span><span></span><span></span>

<div class="mobile-menu" id="mobileMenu" aria-hidden="true">

  <a href="#service"   class="ml">Service</a>
  <a href="#casestudy" class="ml">Case Study</a>
  <a href="#members"   class="ml">Member</a>

</div>

  <div class="hero-inner">

</section>

      <div>
        <h2 id="mission_title"></h2>
        <p  id="mission_text"></p>
      </div>
    </div>
  </div>
</section>

<section id="service">
  <div class="container">
    <span class="tag" id="service_tag"></span>
    <h2 id="service_title"></h2>
    <div class="service-grid">
      <div class="service-card"><div class="service-num">01</div><h3 id="s1_title"></h3><p id="s1_text"></p></div>
      <div class="service-card"><div class="service-num">02</div><h3 id="s2_title"></h3><p id="s2_text"></p></div>

<section id="casestudy">

        <div class="case-card-num">01</div>

</section>

<section id="members">
  <div class="container">

      <div class="member-card">
        <div class="member-avatar">河村</div>

        <div class="plan-label">社員啓蒙活動</div>
        <ul class="plan-items"><li id="p2_i1"></li><li id="p2_i2"></li><li id="p2_i3"></li><li id="p2_i4"></li></ul>
        <div class="plan-label">広報活動</div>
        <ul class="plan-items"><li id="p2_i5"></li><li id="p2_i6"></li></ul>

        <div class="partner-card">株式会社<br>シンギ</div>

<section id="contact" class="contact">

<script>
(function () {
  function s(id, val) {
    var el = document.getElementById(id);
    if (el && val != null && val !== '') el.innerHTML = String(val).replace(/\n/g, '<br>');
  }
  function setText(id, val) {
    var el = document.getElementById(id);
    if (el && val != null) el.textContent = val;
  }

  // Nav
  s('nav_logo', content.nav_logo);

  // Hero — h1の1行目はオレンジハイライト + 末尾の句読点を直前1文字と nowrap で結合（行頭禁則）
  var heroH1 = document.getElementById('hero_h1');
  if (heroH1 && content.hero_heading) {
    var heroLines = content.hero_heading.split('\n');
    var line1Html = (heroLines[0] || '').replace(/(.)([、。])$/, '<span style="white-space:nowrap">$1$2</span>');
    heroH1.innerHTML = '<span class="highlight">' + line1Html + '</span>'
                     + '<span class="h1-line2">' + (heroLines[1] || '') + '</span>';
  }
  s('hero_tag', content.hero_tag);
  var heroSub = content.hero_sub ? content.hero_sub.split('\n') : [];
  s('hero_lead', heroSub[0] || '');
  s('hero_body', heroSub.slice(1).join('\n'));

  // Mission — タイトルにオレンジハイライト
  var missionTitle = document.getElementById('mission_title');
  if (missionTitle && content.mission_title) {
    missionTitle.innerHTML = '<span class="highlight">' + content.mission_title + '</span>';
  }
  s('mission_tag', content.mission_tag);
  s('mission_text', content.mission_text);

  // Service
  s('service_tag', content.service_tag);
  s('service_title', content.service_title);
  s('s1_title', content.service_item1_title); s('s1_text', content.service_item1_text);
  s('s2_title', content.service_item2_title); s('s2_text', content.service_item2_text);
  s('s3_title', content.service_item3_title); s('s3_text', content.service_item3_text);

  // Case Study — タイトルにオレンジハイライト
  s('case_tag', content.casestudy_tag);
  var caseTitle = document.getElementById('case_title');
  if (caseTitle && content.casestudy_title) {
    caseTitle.innerHTML = '<span class="highlight">' + content.casestudy_title + '</span>';
  }
  s('c1_title', content.case1_title); s('c1_text', content.case1_text);
  s('c1_stat', content.case1_stat);   s('c1_stat_label', content.case1_stat_label);
  s('c2_title', content.case2_title); s('c2_text', content.case2_text);
  s('c2_stat', content.case2_stat);   s('c2_stat_label', content.case2_stat_label);

  // Member
  s('member_tag', content.member_tag);
  s('member_title', content.member_title);
  s('m1_role', content.member1_role); s('m1_name', content.member1_name); s('m1_desc', content.member1_desc);
  s('m2_role', content.member2_role); s('m2_name', content.member2_name); s('m2_desc', content.member2_desc);

  // Donation
  s('donation_tag', content.donation_tag);
  s('donation_title', content.donation_title);
  s('donation_text', content.donation_text);
  s('p1_badge', content.plan1_label + ' ／ 1口〜'); s('p1_name', content.plan1_title);
  s('p1_i1', content.plan1_item1); s('p1_i2', content.plan1_item2); s('p1_i3', content.plan1_item3);
  s('p2_badge', content.plan2_label + ' ／ 5口〜'); s('p2_name', content.plan2_title);
  s('p2_i1', content.plan2_item1); s('p2_i2', content.plan2_item2);
  s('p2_i3', content.plan2_item3); s('p2_i4', content.plan2_item4);
  s('p2_i5', content.plan2_item5); s('p2_i6', content.plan2_item6);
  s('uses_title', content.donation_use_title);
  s('use1', content.donation_use1); s('use2', content.donation_use2); s('use3', content.donation_use3);
  s('donation_note', content.donation_note);

  // Contact
  s('contact_tag', content.contact_tag);
  s('contact_title', content.contact_title);
  s('contact_text', content.contact_text);
  var orgInfo = document.getElementById('org_info');
  if (orgInfo) {
    orgInfo.innerHTML = (content.org_name || '') + '<br>'
                      + (content.org_address || '') + '<br>'
                      + '<a href="' + content.org_url + '">' + content.org_url + '</a>';
  }
  var contactBtn = document.getElementById('contact_btn');
  if (contactBtn) {
    contactBtn.textContent = content.contact_button;
    contactBtn.href = 'mailto:' + content.contact_email;
  }

  // Footer
  s('footer_text', content.footer_text);
  setText('footer_version', content.version ? 'v' + content.version : '');

  // Mobile menu — open状態を一元管理し aria 属性も同期
  var hamburger  = document.getElementById('hamburger');
  var mobileMenu = document.getElementById('mobileMenu');
  function setMenuOpen(open) {
    hamburger.classList.toggle('open', open);
    mobileMenu.classList.toggle('open', open);
    hamburger.setAttribute('aria-expanded', String(open));
    mobileMenu.setAttribute('aria-hidden', String(!open));
  }
  hamburger.addEventListener('click', function () {
    setMenuOpen(!hamburger.classList.contains('open'));
  });
  mobileMenu.querySelectorAll('a').forEach(function (a) {
    a.addEventListener('click', function () { setMenuOpen(false); });
  });
})();
</script>
</body>
</html>
